<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atena Video Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:32px;max-width:580px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
h1{font-size:24px;margin-bottom:8px;color:#e94560}
.sub{color:#888;font-size:14px;margin-bottom:24px}
.dropzone{border:2px dashed #333;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:20px}
.dropzone:hover,.dropzone.dragover{border-color:#e94560;background:rgba(233,69,96,.08)}
.dropzone.has-file{border-color:#0f3460;background:rgba(15,52,96,.1)}
.dropzone p{color:#aaa;font-size:14px}
.dropzone .filename{color:#e94560;font-weight:600;margin-top:8px;font-size:15px}
#fileInput{display:none}
.btn{background:#e94560;color:#fff;border:none;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;width:100%;transition:.2s}
.btn:hover{background:#c73650}
.btn:disabled{opacity:.4;cursor:not-allowed}
.progress{display:none;margin-top:20px;padding:16px;background:#16213e;border-radius:8px;text-align:center}
.progress.active{display:block}
.progress .bar{height:4px;background:#0f3460;border-radius:4px;margin-top:12px;overflow:hidden}
.progress .bar-inner{height:100%;width:0;background:#e94560;border-radius:4px;transition:width 1s}
.result{display:none;margin-top:20px}
.result.active{display:block}
.result video{width:100%;border-radius:8px;margin-bottom:12px}
.result .links{display:flex;gap:8px;flex-wrap:wrap}
.result .links a{background:#0f3460;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-size:14px;transition:.2s}
.result .links a:hover{background:#1a4a7a}
.error{color:#e94560;font-size:14px;margin-top:12px}
footer{margin-top:20px;font-size:12px;color:#555}
</style>
</head>
<body>
<div class="card">
<h1>🎬 Atena Video</h1>
<p class="sub">Cola o video, sai legendado. Simples.</p>

<div class="dropzone" id="dropzone">
<p>Arraste o video aqui ou clique para selecionar</p>
<p style="font-size:12px;color:#666;margin-top:6px">MP4, MOV, AVI — até 200 MB</p>
<div class="filename" id="filename"></div>
</div>
<input type="file" id="fileInput" accept="video/*">

<button class="btn" id="processBtn" disabled>🎯 Processar Video</button>

<div class="progress" id="progress">
<p id="progressText">Processando...</p>
<div class="bar"><div class="bar-inner" id="barInner"></div></div>
</div>

<div class="result" id="result">
<video controls id="resultVideo"></video>
<div class="links">
<a id="downloadVideo" download>⬇ Baixar Video</a>
<a id="downloadSrt" download>📄 Baixar Legendas (SRT)</a>
</div>
</div>

<div class="error" id="error"></div>
</div>
<footer>Atena Video Editor — open source, sem marca d'agua</footer>

<script>
const dropzone=document.getElementById('dropzone')
const fileInput=document.getElementById('fileInput')
const filename=document.getElementById('filename')
const processBtn=document.getElementById('processBtn')
const progress=document.getElementById('progress')
const progressText=document.getElementById('progressText')
const barInner=document.getElementById('barInner')
const result=document.getElementById('result')
const resultVideo=document.getElementById('resultVideo')
const downloadVideo=document.getElementById('downloadVideo')
const downloadSrt=document.getElementById('downloadSrt')
const errorDiv=document.getElementById('error')
let selectedFile=null

dropzone.addEventListener('click',()=>fileInput.click())
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover')})
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('dragover'))
dropzone.addEventListener('drop',e=>{
e.preventDefault()
dropzone.classList.remove('dragover')
if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])
})
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])})

function handleFile(f){
selectedFile=f
dropzone.classList.add('has-file')
filename.textContent=f.name
processBtn.disabled=false
errorDiv.textContent=''
result.classList.remove('active')
}

processBtn.addEventListener('click',async ()=>{
if(!selectedFile)return
processBtn.disabled=true
progress.classList.add('active')
barInner.style.width='10%'
progressText.textContent='Enviando video...'
errorDiv.textContent=''

const form=new FormData()
form.append('video',selectedFile)
form.append('lang','pt')

try{
const res=await fetch('/api/process',{method:'POST',body:form})
barInner.style.width='60%'
progressText.textContent='Processando...'
const data=await res.json()
if(!res.ok||data.error)throw new Error(data.error||'Erro no servidor')
barInner.style.width='100%'
progressText.textContent='✅ Pronto!'
setTimeout(()=>{
progress.classList.remove('active')
result.classList.add('active')
resultVideo.src=data.video_url
downloadVideo.href=data.video_url
downloadSrt.href=data.srt_url
processBtn.disabled=false
selectedFile=null
dropzone.classList.remove('has-file')
filename.textContent=''
},500)
}catch(e){
barInner.style.width='0'
progressText.textContent='❌ Erro'
errorDiv.textContent='Erro: '+e.message
processBtn.disabled=false
}
})
</script>
</body>
</html>
